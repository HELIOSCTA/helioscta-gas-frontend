services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "1111:1111"
    env_file:
      - ./backend/src/.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn src.api:app --host 0.0.0.0 --port 1111 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "2222:2222"
    env_file:
      - ./frontend/.env.local
    environment:
      - PYTHON_API_URL=http://backend:1111
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
